spring.application.name=order-service
server.port=8082

#MySql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Consul
spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.health-check-path=/actuator/health

#RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=root
spring.rabbitmq.password=root

rabbitmq.exchange=order.invoice
rabbitmq.queue=invoice.queue
rabbitmq.routing-key=invoice

#Inventory service URL
inventory.service.url=http://inventory-service

# Prometheus
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.export.prometheus.enabled=true

# Tracing
management.tracing.sampling.probability=1.0
spring.rabbitmq.template.observation-enabled=true
spring.rabbitmq.listener.simple.observation-enabled=true
spring.cloud.loadbalancer.restclient.enabled=false

# Logging
logging.level.com.example.orderservice=DEBUG
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.web.filter.ServerHttpObservationFilter=TRACE
logging.level.org.springframework.boot.actuate.autoconfigure.observation=DEBUG
logging.level.org.springframework.boot.actuate.autoconfigure.tracing=DEBUG
logging.pattern.level=%5p [%X{traceId:-} %X{spanId:-}]