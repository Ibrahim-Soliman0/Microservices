spring.application.name=order-service
server.port=8082

#MySql
spring.datasource.url=jdbc:mysql://localhost:3306/microservice_order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

#RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=root
spring.rabbitmq.password=root
rabbitmq.exchange=order.invoice
rabbitmq.queue=invoice.queue
rabbitmq.routing-key=invoice

#Inventory service URL
inventory.service.url=http://inventory-service


# Logging
logging.level.com.example.orderservice=DEBUG
logging.level.org.springframework.amqp=INFO