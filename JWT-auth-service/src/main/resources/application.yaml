server:
  port: 8085

jwt:
  secret: mysecretkeyformicroserviceapp1234
  expiration: 3600000
  refresh-expiration: 604800000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jwt_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect